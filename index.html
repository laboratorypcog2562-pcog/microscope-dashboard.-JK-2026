<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔬 Microscopy Control Room Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="alertContainer"></div>
<div id="problemPanel"></div>

<div class="header">
<h1>🔬 Microscopy Control Room Dashboard</h1>
<p>Department of Pharmacognosy and Pharmaceutical Botany, Faculty of Pharmaceutical Sciences, Prince of Songkla University (PSU)</p>
</div>

<div class="search-box">
<input type="text" id="searchBox" placeholder="🔍 ค้นหากล้อง, ผู้ใช้, สถานะ">
</div>

<div class="filter-container">

<button onclick="filterStatus('all')">
ทั้งหมด
</button>

<button onclick="filterStatus('normal')">
ปกติ
</button>

<button onclick="filterStatus('warning')">
มีปัญหา
</button>

<button onclick="filterStatus('danger')">
ใช้งานไม่ได้
</button>

<button onclick="filterStatus('norecord')">
ไม่มีข้อมูล
</button>

</div>

<div class="summary">

<div class="summary-card normal">
<div id="normalCount">0</div>
<span>Normal</span>
</div>

<div class="summary-card warning">
<div id="warningCount">0</div>
<span>Warning</span>
</div>

<div class="summary-card danger">
<div id="dangerCount">0</div>
<span>Out of Service</span>
</div>

<div class="summary-card norecord">
<div id="norecordCount">0</div>
<span>No Record</span>
</div>

</div>

<div id="dashboard"></div>

<script>

let searchKeyword = "";
let currentFilter = "all";

/* =========================
   MAIN REAL-TIME FUNCTION
========================= */

async function loadDashboard() {

try {

const response = await fetch(
"data.json?t=" + Date.now()
);

const data = await response.json();

renderDashboard(data);

} catch (error) {
console.error(error);
}

}

/* =========================
   RENDER FUNCTION
========================= */

function renderDashboard(data) {

let normal = 0;
let warning = 0;
let danger = 0;
let norecord = 0;

const dashboard =
document.getElementById("dashboard");

const alertContainer =
document.getElementById("alertContainer");

const problemPanel =
document.getElementById("problemPanel");

dashboard.innerHTML = "";
alertContainer.innerHTML = "";
problemPanel.innerHTML = "";

const problemList = [];

data.forEach(item => {

const microscope = item.microscope || "-";
const user = item.user || "-";
const course = item.course || "-";
const location = item.location || "-";
const problem = item.problem || "-";
const image = item.image || "-";
const status = (item.status || "").toString();

let displayDate = "-";

if (item.date && item.date !== "-") {
try {
displayDate = new Date(item.date).toLocaleString("th-TH", {
year: "numeric",
month: "short",
day: "numeric",
hour: "2-digit",
minute: "2-digit"
});
} catch (e) {
displayDate = item.date;
}
}

let cardClass = "norecord";

if (status.includes("Normal")) {
cardClass = "normal";
normal++;
}
else if (status.includes("Warning")) {
cardClass = "warning";
warning++;
problemList.push(`${microscope} : ${problem}`);
}
else if (status.includes("Out of Service")) {
cardClass = "danger";
danger++;
problemList.push(`${microscope} : ${problem}`);
}
else {
norecord++;
}

dashboard.innerHTML += `
<div class="card ${cardClass}">
<h3>${microscope}</h3>

<div class="status">${status}</div>
<div class="user">👤 ${user}</div>
<div class="course">📘 ${course}</div>
<div class="location">📍 ${location}</div>
<div class="date">📅 ${displayDate}</div>

${(problem !== "-" && problem !== "")
? `<div class="problem">⚠️ ${problem}</div>`
: ""}

${(image !== "-" && image !== "")
? `<div class="imageBox">
<a href="${image}" target="_blank">📷 ดูรูปภาพ</a>
</div>`
: ""}

</div>
`;

});

/* =========================
   ALERT
========================= */

if (danger > 0) {
alertContainer.innerHTML += `
<div class="alert-danger">
🔴 ALERT : พบกล้องใช้งานไม่ได้ ${danger} เครื่อง
</div>`;
}

if (warning > 0) {
alertContainer.innerHTML += `
<div class="alert-warning">
🟡 WARNING : พบกล้องมีปัญหา ${warning} เครื่อง
</div>`;
}

if (danger === 0 && warning === 0) {
alertContainer.innerHTML += `
<div class="alert-success">
🟢 ระบบปกติ กล้องทั้งหมดพร้อมใช้งาน
</div>`;
}

/* =========================
   PROBLEM PANEL
========================= */

if (problemList.length > 0) {

problemPanel.innerHTML = `
<div class="problem-panel">
<h2>⚠️ รายชื่อกล้องที่มีปัญหา</h2>
<ul>
${problemList.map(item => `<li>${item}</li>`).join("")}
</ul>
</div>
`;

}

/* =========================
   SUMMARY
========================= */

document.getElementById("normalCount").innerText = normal;
document.getElementById("warningCount").innerText = warning;
document.getElementById("dangerCount").innerText = danger;
document.getElementById("norecordCount").innerText = norecord;

/* =========================
   SEARCH (persist keyword)
========================= */

const cards = document.querySelectorAll(".card");

cards.forEach(card => {

const text =
card.innerText.toLowerCase();

const matchSearch =
text.includes(
searchKeyword.toLowerCase()
);

const matchFilter =
currentFilter === "all"
||
card.classList.contains(
currentFilter
);

if(matchSearch && matchFilter){

card.style.display = "block";

}
else{

card.style.display = "none";

}

});

}

/* =========================
   SEARCH EVENT
========================= */

document.getElementById("searchBox")
.addEventListener("keyup", function () {
searchKeyword = this.value;
loadDashboard(); // refresh + apply filter
});

/* =========================
   AUTO REFRESH (REAL TIME)
========================= */

// โหลดครั้งแรก
loadDashboard();

// refresh ทุก 5 วินาที
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
